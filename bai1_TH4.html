<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Điểm Sinh Viên</title>
    <link rel="stylesheet" href="bai1_TH4.css">
</head>
<body>

    <h2>BẢNG ĐIỂM SINH VIÊN</h2>

    <div class="input-section">
        <input type="text" id="txtName" placeholder="Họ tên sinh viên">
        <input type="number" id="txtScore" placeholder="Điểm (0-10)" min="0" max="10" step="0.1">
        <button id="btnAdd">THÊM</button>
    </div>

    <div class="filter-section">
        <input type="text" id="searchName" placeholder="🔍 Tìm kiếm tên sinh viên...">
        <select id="filterRank">
            <option value="all">Tất cả xếp loại</option>
            <option value="Giỏi">Giỏi</option>
            <option value="Khá">Khá</option>
            <option value="Trung bình">Trung bình</option>
            <option value="Yếu">Yếu</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 80px;">STT</th>
                <th>Họ tên</th>
                <th id="sortScore" class="sortable">Điểm <span id="sortIcon">↕</span></th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <div class="summary" id="statsArea">
        Tổng số SV: <span id="totalSV">0</span> | 
        Điểm trung bình: <span id="avgScore">0</span>
    </div>

    <script src="bai1_TH4.js"></script>
</body>
</html>
