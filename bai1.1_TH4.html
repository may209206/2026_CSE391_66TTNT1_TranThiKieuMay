<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Điểm Sinh Viên</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background-color: #f4f4f4; }
        .bg-yellow { background-color: #ebeb05; } /* Màu cho điểm < 5 */
        .stats { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Bảng Điểm Sinh Viên</h2>
    
    <div>
        <input type="text" id="txtName" placeholder="Họ tên sinh viên">
        <input type="number" id="txtScore" placeholder="Điểm (0-10)" min="0" max="10" step="0.1">
        <button id="btnAdd">Thêm</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th>Điểm</th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <div class="stats" id="statsArea">
        Tổng số SV: 0 | Điểm trung bình: 0
    </div>

    <script src="bai1.1_TH4.js"></script>
    <script src="bai1.1_TH4.css"></script>
</body>
</html>
